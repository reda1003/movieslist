<div class="login-page">
  <mat-card class="login-card">
    <mat-card-header>
      <mat-card-title>Connexion</mat-card-title>
      <mat-card-subtitle>Accédez à votre watchlist</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form class="login-form" (ngSubmit)="login()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email</mat-label>
          <input matInput [(ngModel)]="email" name="email" type="email" placeholder="Ex. pat@example.com" required>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Mot de passe</mat-label>
          <input matInput [(ngModel)]="mdp" name="mdp" type="password" required>
        </mat-form-field>

        <div class="actions">
          <button mat-raised-button color="primary" type="submit">Se Connecter</button>
          <button mat-button type="button" routerLink="/signin">Vous n'avez pas de compte ?</button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
